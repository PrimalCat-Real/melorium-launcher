[package]
name = "ariadne"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = { version = "0.4.42", features = ["serde"] }
either = "1.15.0"
rand = "0.8.5"
serde = { version = "1.0", features = ["derive"] }
serde_bytes = "0.11.19"
serde_cbor = "0.11.2"
serde_json = "1.0"
thiserror = "1.0"
utoipa = { version = "5.4.0", features = ["chrono", "uuid"] }
uuid = { version = "1.18.1", features = ["fast-rng", "serde", "v4"] }
